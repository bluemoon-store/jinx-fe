<svg width="244" height="120" viewBox="0 0 244 120" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>

<style>
/* Each flame pivots from its base at y=120 */
.f1,.f2,.f3,.f4,.f5,.f6,.f7,.f8,.f9,.f10 { transform-box: view-box; }

.f1  { transform-origin:  17px 120px; animation: b1  1.30s ease-in-out infinite alternate; }
.f2  { transform-origin:  46px 120px; animation: b2  1.75s ease-in-out infinite alternate; animation-delay:-0.50s; }
.f3  { transform-origin:  70px 120px; animation: b3  1.45s ease-in-out infinite alternate; animation-delay:-0.95s; }
.f4  { transform-origin:  95px 120px; animation: b4  2.00s ease-in-out infinite alternate; animation-delay:-0.30s; }
.f5  { transform-origin: 120px 120px; animation: b5  1.60s ease-in-out infinite alternate; animation-delay:-1.20s; }
.f6  { transform-origin: 144px 120px; animation: b6  1.35s ease-in-out infinite alternate; animation-delay:-0.70s; }
.f7  { transform-origin: 169px 120px; animation: b7  1.90s ease-in-out infinite alternate; animation-delay:-1.40s; }
.f8  { transform-origin: 195px 120px; animation: b8  1.25s ease-in-out infinite alternate; animation-delay:-0.40s; }
.f9  { transform-origin: 218px 120px; animation: b9  1.70s ease-in-out infinite alternate; animation-delay:-0.85s; }
.f10 { transform-origin: 236px 120px; animation: b10 1.50s ease-in-out infinite alternate; animation-delay:-1.10s; }

@keyframes b1 {
  0%   { transform: scaleY(1.00) rotate(-1.5deg); opacity: 1.00; }
  50%  { transform: scaleY(0.87) rotate( 0.3deg); opacity: 0.82; }
  100% { transform: scaleY(0.73) rotate( 2.2deg); opacity: 0.62; }
}
@keyframes b2 {
  0%   { transform: scaleY(0.78) rotate( 1.8deg); opacity: 0.65; }
  50%  { transform: scaleY(0.94) rotate(-0.4deg); opacity: 0.84; }
  100% { transform: scaleY(1.10) rotate(-1.6deg); opacity: 1.00; }
}
@keyframes b3 {
  0%   { transform: scaleY(1.04) rotate( 0.6deg); opacity: 0.96; }
  40%  { transform: scaleY(0.84) rotate(-1.1deg); opacity: 0.74; }
  100% { transform: scaleY(0.70) rotate(-2.4deg); opacity: 0.58; }
}
@keyframes b4 {
  0%   { transform: scaleY(0.83) rotate(-0.7deg); opacity: 0.72; }
  60%  { transform: scaleY(1.00) rotate( 0.5deg); opacity: 0.90; }
  100% { transform: scaleY(1.14) rotate( 1.4deg); opacity: 1.00; }
}
@keyframes b5 {
  0%   { transform: scaleY(1.02) rotate(-1.0deg); opacity: 0.96; }
  45%  { transform: scaleY(0.88) rotate( 0.2deg); opacity: 0.80; }
  100% { transform: scaleY(0.76) rotate( 1.8deg); opacity: 0.65; }
}
@keyframes b6 {
  0%   { transform: scaleY(0.80) rotate( 2.0deg); opacity: 0.68; }
  55%  { transform: scaleY(0.96) rotate( 0.4deg); opacity: 0.86; }
  100% { transform: scaleY(1.12) rotate(-0.8deg); opacity: 1.00; }
}
@keyframes b7 {
  0%   { transform: scaleY(1.00) rotate(-1.8deg); opacity: 0.95; }
  35%  { transform: scaleY(0.85) rotate(-0.6deg); opacity: 0.78; }
  100% { transform: scaleY(0.68) rotate( 2.1deg); opacity: 0.58; }
}
@keyframes b8 {
  0%   { transform: scaleY(0.76) rotate( 1.0deg); opacity: 0.66; }
  60%  { transform: scaleY(0.94) rotate(-0.3deg); opacity: 0.84; }
  100% { transform: scaleY(1.08) rotate(-1.8deg); opacity: 1.00; }
}
@keyframes b9 {
  0%   { transform: scaleY(0.92) rotate(-0.5deg); opacity: 0.84; }
  50%  { transform: scaleY(0.79) rotate( 0.9deg); opacity: 0.70; }
  100% { transform: scaleY(0.66) rotate( 2.3deg); opacity: 0.54; }
}
@keyframes b10 {
  0%   { transform: scaleY(0.74) rotate(-0.8deg); opacity: 0.62; }
  55%  { transform: scaleY(0.88) rotate( 0.6deg); opacity: 0.80; }
  100% { transform: scaleY(1.05) rotate( 1.6deg); opacity: 1.00; }
}
</style>

<!-- Warm fire stroke gradient: deep red at base → orange mid → bright at tips -->
<linearGradient id="gs" x1="122" y1="120" x2="122" y2="0" gradientUnits="userSpaceOnUse">
  <stop offset="0%"   stop-color="#CC2200">
    <animate attributeName="stop-color" values="#CC2200;#FF4400;#CC2200" dur="2.0s" repeatCount="indefinite"/>
  </stop>
  <stop offset="55%"  stop-color="#FF6600">
    <animate attributeName="stop-color" values="#FF6600;#FF9900;#FF5500;#FF6600" dur="2.6s" repeatCount="indefinite"/>
  </stop>
  <stop offset="100%" stop-color="#FFDD00">
    <animate attributeName="stop-color" values="#FFDD00;#FFFFFF;#FFAA00;#FFDD00" dur="1.8s" repeatCount="indefinite"/>
  </stop>
</linearGradient>

<!--
  Flame silhouette — open path tracing 10 individual flame tongues.
  Designed from the GIF reference: tall centre flames, shorter outer ones,
  shallow valleys between them so the fire looks continuous at the base.
  fill="none" — stroke only.
-->
<path id="fp"
  fill="none"
  stroke="url(#gs)"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  d="M 0,120
     C  0,100  12,65  22,38
     C  32,65  36,105 35,110
     C  38,105 44,88  48,72
     C  52,88  57,108 58,112
     C  60,108 65,50  70,18
     C  75,50  80,102 82,108
     C  84,102 90,78  95,62
     C 100,78  106,106 108,110
     C 110,106 115,38 120,8
     C 125,38  130,104 132,108
     C 134,104 140,72 144,52
     C 148,72  154,106 156,110
     C 158,106 163,48 168,22
     C 173,48  179,102 182,108
     C 184,102 192,84 196,68
     C 200,84  206,108 208,112
     C 210,108 216,62 220,38
     C 224,62  228,106 229,110
     C 231,106 235,88 238,75
     C 241,88  243,112 244,115"/>

<!-- 10 clip paths, one per flame tongue -->
<clipPath id="c1" ><rect x="0"   y="0" width="35"  height="120"/></clipPath>
<clipPath id="c2" ><rect x="35"  y="0" width="23"  height="120"/></clipPath>
<clipPath id="c3" ><rect x="58"  y="0" width="24"  height="120"/></clipPath>
<clipPath id="c4" ><rect x="82"  y="0" width="26"  height="120"/></clipPath>
<clipPath id="c5" ><rect x="108" y="0" width="24"  height="120"/></clipPath>
<clipPath id="c6" ><rect x="132" y="0" width="24"  height="120"/></clipPath>
<clipPath id="c7" ><rect x="156" y="0" width="26"  height="120"/></clipPath>
<clipPath id="c8" ><rect x="182" y="0" width="26"  height="120"/></clipPath>
<clipPath id="c9" ><rect x="208" y="0" width="21"  height="120"/></clipPath>
<clipPath id="c10"><rect x="229" y="0" width="15"  height="120"/></clipPath>

</defs>

<!-- All 10 flame tongues, each burning at its own tempo -->
<g clip-path="url(#c1)"  class="f1" ><use href="#fp"/></g>
<g clip-path="url(#c2)"  class="f2" ><use href="#fp"/></g>
<g clip-path="url(#c3)"  class="f3" ><use href="#fp"/></g>
<g clip-path="url(#c4)"  class="f4" ><use href="#fp"/></g>
<g clip-path="url(#c5)"  class="f5" ><use href="#fp"/></g>
<g clip-path="url(#c6)"  class="f6" ><use href="#fp"/></g>
<g clip-path="url(#c7)"  class="f7" ><use href="#fp"/></g>
<g clip-path="url(#c8)"  class="f8" ><use href="#fp"/></g>
<g clip-path="url(#c9)"  class="f9" ><use href="#fp"/></g>
<g clip-path="url(#c10)" class="f10"><use href="#fp"/></g>

</svg>
